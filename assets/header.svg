<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Boris Workflow for Claude Code, Codex, and OpenCode</title>
  <desc id="desc">A dark gradient banner showing three AI coding tools connected by a safe workflow loop: plan, build, review, verify.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.45" stop-color="#111A35"/>
      <stop offset="1" stop-color="#251342"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(232 110) rotate(45) scale(360 220)">
      <stop stop-color="#60A5FA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 318) rotate(135) scale(420 260)">
      <stop stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="286" y1="126" x2="994" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glowA)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glowB)"/>

  <g opacity="0.16">
    <path d="M68 78H1212" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M68 342H1212" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M146 36V384" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M1134 36V384" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="146" cy="78" r="4" fill="#E0F2FE"/>
    <circle cx="1134" cy="342" r="4" fill="#F5D0FE"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="86" width="1108" height="248" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
  </g>

  <path d="M286 238C394 114 526 114 640 210C754 306 886 306 994 182" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.95"/>
  <path d="M306 260C420 160 520 152 640 232C760 312 856 292 974 204" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>

  <g>
    <rect x="169" y="145" width="178" height="94" rx="20" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="258" y="184" text-anchor="middle" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Claude Code</text>
    <text x="258" y="213" text-anchor="middle" fill="#93C5FD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">commands + agents</text>
  </g>

  <g>
    <rect x="551" y="126" width="178" height="94" rx="20" fill="#111827" stroke="#818CF8" stroke-opacity="0.6"/>
    <text x="640" y="165" text-anchor="middle" fill="#EEF2FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="800">Boris</text>
    <text x="640" y="194" text-anchor="middle" fill="#C7D2FE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">plan · build · verify</text>
  </g>

  <g>
    <rect x="933" y="145" width="178" height="94" rx="20" fill="#17122A" stroke="#C084FC" stroke-opacity="0.6"/>
    <text x="1022" y="184" text-anchor="middle" fill="#FAE8FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">OpenCode</text>
    <text x="1022" y="213" text-anchor="middle" fill="#D8B4FE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">commands + guardrails</text>
  </g>

  <g>
    <rect x="551" y="242" width="178" height="64" rx="18" fill="#0B1224" stroke="#22D3EE" stroke-opacity="0.45"/>
    <text x="640" y="282" text-anchor="middle" fill="#CFFAFE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Codex Skills</text>
  </g>

  <text x="640" y="58" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="35" font-weight="850" letter-spacing="-0.8">Global Boris Workflow</text>
  <text x="640" y="373" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">One methodology for Claude Code, Codex, and OpenCode</text>
</svg>
